version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
  settings:
    gosec:
      excludes:
        # G104: Errors unhandled — handled by errcheck
        - G104

formatters:
  enable:
    - goimports
  settings:
    goimports:
      # enforce stdlib imports grouped separately from external
      local-prefixes:
        - github.com/myrrolinz/cronmon

issues:
  exclude-rules:
    # Allow errcheck to skip test files (assert calls etc.)
    - path: _test\.go
      linters:
        - errcheck
