{{define "layout"}}<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{template "title" .}} — CronMon</title>
  <link rel="stylesheet" href="/static/pico.min.css">
  <style>
    .status-badge {
      display: inline-block;
      padding: 0.15em 0.55em;
      border-radius: var(--pico-border-radius);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .status-up    { background: #d1fae5; color: #065f46; }
    .status-down  { background: #fee2e2; color: #991b1b; }
    .status-new   { background: #e0e7ff; color: #3730a3; }
    .status-paused{ background: #f3f4f6; color: #6b7280; }
    .ping-square {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 2px;
      margin-right: 2px;
      vertical-align: middle;
      cursor: default;
    }
    .ping-success { background: #22c55e; }
    .ping-fail    { background: #ef4444; }
    .ping-start   { background: #f59e0b; }
    .ping-empty   { background: #e5e7eb; }
    .tag-badge {
      display: inline-block;
      padding: 0.1em 0.45em;
      border-radius: var(--pico-border-radius);
      font-size: 0.7rem;
      background: #eff6ff;
      color: #1d4ed8;
      margin-right: 3px;
    }
    .channel-badge {
      display: inline-block;
      padding: 0.1em 0.45em;
      border-radius: var(--pico-border-radius);
      font-size: 0.7rem;
      background: #f0fdf4;
      color: #166534;
      font-weight: 600;
    }
    nav.top-nav {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--pico-muted-border-color);
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    nav.top-nav a { text-decoration: none; }
    nav.top-nav .brand { font-weight: 700; font-size: 1.1rem; }
    .ping-url-row { display: flex; align-items: center; gap: 0.5rem; }
    .ping-url-row code { flex: 1; font-size: 0.8rem; word-break: break-all; }
    .copy-btn { white-space: nowrap; }
  </style>
</head>
<body>
  <nav class="top-nav">
    <a class="brand" href="/checks">CronMon</a>
    <a href="/checks">Checks</a>
    <a href="/channels">Channels</a>
  </nav>
  <main class="container" style="margin-top:1.5rem">
    {{template "content" .}}
  </main>
  {{template "scripts" .}}
</body>
</html>
{{end}}

{{define "scripts"}}{{end}}
